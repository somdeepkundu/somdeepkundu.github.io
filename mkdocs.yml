# ============================================================
# PORTFOLIO CONFIGURATION
# Edit all lines marked [YOUR ...] to customize your site
# ============================================================

site_name: "Somdeep Kundu - Geospatial Portfolio"
site_description: "Portfolio of Somdeep Kundu — GIS, Remote Sensing, and Spatial Data Science"
site_author: "Somdeep Kundu"
# After your site is live, uncomment and set this to your actual GitHub Pages URL:
# site_url: "https://your-username.github.io/your-repo-name"
site_url: "https://somdeepkundu.github.io/"

theme:
  name: material
  # Icon used as both the site logo (header) and browser favicon.
  # Browse icons at https://squidfunk.github.io/mkdocs-material/reference/icons-emojis/
  # and replace "material/earth" with any "material/..." icon name you prefer.
  icon:
    logo: material/earth
  palette:
    # To change the color, edit the 'primary' and 'accent' values below for both
    # the 'default' (light) and 'slate' (dark) schemes.
    # Available colors: red, pink, purple, deep purple, indigo, blue, light blue,
    # cyan, teal, green, light green, lime, yellow, amber, orange, deep orange
    - scheme: default            # Light mode
      primary: custom
      accent: blue
      toggle:
        icon: material/brightness-3
        name: Switch to dark mode
    - scheme: slate              # Dark mode
      primary: custom
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs            # Top-level nav items shown as horizontal tabs
    - navigation.top             # Back-to-top button when scrolling up
    - content.code.copy          # Copy button on all code blocks
  font:
    text: Roboto
    code: Roboto Mono

extra_css:
  - assets/css/extra.css

markdown_extensions:
  - md_in_html        # Allows Markdown inside HTML blocks (used for project cards)
  - attr_list         # Allows adding CSS classes to elements: ![img](url){ .class }
  - admonition        # Note/warning/tip boxes
  - pymdownx.details  # Collapsible admonition blocks
  - pymdownx.superfences
  - tables
  - pymdownx.emoji:   # Renders :material-icon: and :fontawesome-brands-icon: inline icons
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

copyright: "Copyright &copy; Somdeep Kundu"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/somdeepkundu
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/somdeep-kundu
    - icon: material/email
      link: mailto:somdeepkundu@gmail.com


plugins:
  - search
  - meta
  - mkdocs-jupyter

nav:
  - Home: index.md
  - Projects:
    - "All Projects": projects/index.md
    - "Bombay Asteroids": projects/bombay-asteroids-gallery.md
    - "India AI Impact Summit": projects/india-ai-summit.md
    - "Alok Kriti 2.0": projects/alok-kriti.md
    - "NFHS Data Analysis": projects/nfhs-analysis.md
    - "Spatial Process Modelling": projects/spatial-modelling.md
    # HOW TO ADD A NEW PROJECT:
    # 1. Create markdown file: docs/projects/your-project-name.md
    # 2. Add line in nav above with your project title and file path
    # 3. Add project card on docs/projects/index.md
  - Publications: publications.md
  - Experience: experience.md
  - Contact: contact.md
